<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
    <header id="header-login">
    </header>
    <main id="main-login">
        <div class="titulo-loja d-flex flex-column">
            <h1>Echo moda</h1>
            <h5>Sua loja de roupas mais amada</h5>
        </div>
        <h2 class="text-center texto-logar mt-5 mb-0">Faça login</h2>
        <div class="container">
            <form class="formulario-entrar">
                <label for="nome">Nome</label>
                <input type="text" placeholder="Ex: Pedro Silva" id="nome">
                <label for="email">Email</label>
                <input type="text" placeholder="Ex: pedrosilva@gmail.com" id="email">
                <label for="senha">Senha</label>
                <input type="password" placeholder="Ex: 029393" id="senha" maxlength="8" inputmode="numeric">
                <button class="botao-logar" id="btn-entrar">Entrar</button>
                <button id="spinner-loading-login" class="btn btn-primary" >
                    <i class="spinner-border spinner-border-sm"></i>
                </button>
            </form>
            <form class="formulario-cadastrar">
                <label for="nome-cadastro">Nome</label>
                <input type="text" placeholder="Ex: Pedro Silva" id="nome-cadastro">
                <label for="email-cadastro">Email</label>
                <input type="text" placeholder="Ex: pedrosilva@gmail.com" id="email-cadastro">
                <label for="senha-cadastro">Senha</label>
                <input type="password" placeholder="Ex: 029393" id="senha-cadastro" maxlength="8" inputmode="numeric">
                <button class="botao-logar" id="btn-cadastrar">Cadastrar</button>
                <button id="spinner-loading-cadastro" class="btn btn-primary" >
                    <i class="spinner-border spinner-border-sm"></i>
                </button>
            </form>
            <form class="formulario-verificar-codigo text-center">
                <h5 class="texto-codigo-enviado-para">Codigo enviado para o email:</h5>
                <p class="texto-verifique-spam">verifique sua caixa de email</p>
                <div class="caixa-digitos-codigo d-flex gap-1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                    <input class="text-center codigo-6-digitos" type="text" placeholder="0" maxlength="1">
                </div>
                <button class="botao-logar mb-4" id="btn-verificar-codigo">Verificar Código</button>
                <button id="spinner-loading-verificar-codigo" class="btn btn-primary" >
                    <i class="spinner-border spinner-border-sm"></i>
                </button>
                <div class="text-center">
                    <h2 class="texto-nao-recebeu-codigo">
                        Não recebeu o codigo?
                    </h2>
                    <a id="" href="#">Reenviar</a>
                </div>
            </form>
        </div>
        <div class="text-center">
            <h2 class="texto-logar" id="texto-ja-possui-login">
                Não possui login?
            </h2>
            <a id="btn-link-cadastrar" href="#">Cadastre-se</a>
        </div>
        <div class="confirmacao-adicao-carrinho">
            <div class="container">
                <h5 class="pt-0"><i class="fas fa-check-circle me-2" style="color: #28a745;"></i>Produto adicionado ao carrinho!</h5>
            </div>
        </div>
    </main>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
  // Inicializa a biblioteca para ela começar a vigiar a rolagem da página
        AOS.init();
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script type="module" src="./dist/js/main.js"></script>
</body>
</html>
